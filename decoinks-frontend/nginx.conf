server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    image/svg+xml;

  location /api/ {
    set $backend_api http://backend:8000;
    proxy_pass $backend_api$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # index.html – never cache so browser always gets latest hashed asset filenames
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri /index.html;
  }

  # Hashed JS/CSS assets – cache forever (content-addressed)
  location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
