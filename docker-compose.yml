services:

  postgres:
    image: postgres:15-alpine
    container_name: decoinks_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: decoinks_pass
      POSTGRES_DB: decoinks_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # The schema is owned entirely by backend/migrations (applied by the
      # backend entrypoint on every start). The old db/*.sql init-script
      # mounts were removed so there is a single source of truth — a fresh
      # database is built by run.js from migration 001 upward, and existing
      # databases are healed by 039_baseline_repair.sql.
    ports:
      - '5435:5432'
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD-SHELL','pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: decoinks_redis
    restart: unless-stopped
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD','redis-cli','ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: decoinks_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: decoinks
      MINIO_ROOT_PASSWORD: decoinks_secret_123
    volumes:
      - minio_data:/data
    ports:
      - '9002:9000'
      - '9003:9001'
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD','curl','-f','http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      target: prod
    container_name: decoinks_backend
    restart: unless-stopped
    # Integration credentials stay in the ignored backend/.env file. Explicit
    # production values below still take precedence for core services.
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "false"
      DATABASE_URL: postgresql://postgres:decoinks_pass@postgres:5432/decoinks_db
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://31.97.110.197,http://31.97.110.197:8093,http://31.97.110.197:8094,http://31.97.110.197:3001,https://printshop.decoinkssuite.com
      JWT_SECRET: Decoinks2026SecretKeyPOSSoftwarePrintShop123XYZ
      # Leave empty to keep SSO disabled until Authentik is configured.
      SSO_SHARED_SECRET: ${SSO_SHARED_SECRET:-}
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: "100"
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: decoinks
      MINIO_SECRET_KEY: decoinks_secret_123
      MINIO_BUCKET: decoinks
      MINIO_PUBLIC_URL: /storage
      # AI CSV import. Defaults to Groq (free, https://groq.com). Put the real
      # key in a .env file on the server, not here. Empty = AI import disabled.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-llama-3.3-70b-versatile}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.groq.com/openai/v1}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - '8094:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [decoinks_net]

  frontend:
    build:
      context: ./decoinks-frontend
      dockerfile: Dockerfile.frontend
    container_name: decoinks_frontend
    restart: unless-stopped
    ports:
      - '8093:80'
    depends_on: [backend]
    networks: [decoinks_net]

  supplier_portal:
    build:
      context: ./supplier-portal
      dockerfile: Dockerfile.portal
    container_name: decoinks_supplier_portal
    restart: unless-stopped
    ports:
      - '3001:80'
    depends_on: [backend]
    networks: [decoinks_net]

volumes:
  postgres_data:
  minio_data:
  backend_uploads:

networks:
  decoinks_net:
    driver: bridge
