services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: decoinks_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decoinks_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-decoinks_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/portal_migration.sql:/docker-entrypoint-initdb.d/02_portal.sql:ro
      - ./db/002_supplier_rename.sql:/docker-entrypoint-initdb.d/03_supplier_rename.sql:ro
    ports:
      - '5433:5432'
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD-SHELL','pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: decoinks_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Object Storage ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: decoinks_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-decoinks}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-decoinks_secret_123}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # MinIO web console
    networks: [decoinks_net]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      target: dev
    container_name: decoinks_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:          development
      DATABASE_URL:      postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-decoinks_pass}@postgres:5432/${POSTGRES_DB:-decoinks_db}
      REDIS_URL:         redis://redis:6379
      MINIO_HOST:        minio
      MINIO_PORT:        "9000"
      MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-decoinks}
      MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-decoinks_secret_123}
      MINIO_BUCKET:      decoinks
      MINIO_PUBLIC_URL:  http://${SERVER_IP:-localhost}:9000
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - '8001:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [decoinks_net]

  # ── Admin POS Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./decoinks-frontend
      dockerfile: Dockerfile.frontend
    container_name: decoinks_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on: [backend]
    networks: [decoinks_net]

  # ── Customer Portal ──────────────────────────────────────────
  customer_portal:
    build:
      context: ./customer-portal
      dockerfile: Dockerfile.portal
    container_name: decoinks_customer_portal
    restart: unless-stopped
    ports:
      - '3001:80'
    depends_on: [backend]
    networks: [decoinks_net]

volumes:
  postgres_data:
  minio_data:

networks:
  decoinks_net:
    driver: bridge
